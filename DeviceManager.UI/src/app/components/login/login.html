<div class="auth-page">
  <div class="auth-header">
    <div class="auth-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
    </div>
    <h1>Device Manager</h1>
    <p>Access your hardware infrastructure control panel.</p>
  </div>

  <div class="auth-card">
    <h2>Login</h2>

    @if (errorMessage) {
      <div class="error-box">{{ errorMessage }}</div>
    }

    <div class="form-group">
      <label>EMAIL *</label>
      <input type="email" [(ngModel)]="data.email" placeholder="your@email.com" />
      @if (submitted && !data.email) {
        <span class="error">Email is required</span>
      }
    </div>

    <div class="form-group">
      <label>PASSWORD *</label>
      <input type="password" [(ngModel)]="data.password" placeholder="Password" />
      @if (submitted && !data.password) {
        <span class="error">Password is required</span>
      }
    </div>

    <button (click)="login()" class="btn-submit">Login</button>

    <p class="link-text">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>
  </div>
</div>
