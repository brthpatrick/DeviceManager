<div class="auth-card">
  <h2>Login</h2>

  @if (errorMessage) {
    <div class="error-box">{{ errorMessage }}</div>
  }

  <div class="form-group">
    <label>Email *</label>
    <input type="email" [(ngModel)]="data.email" placeholder="your@email.com" />
    @if (submitted && !data.email) {
      <span class="error">Email is required</span>
    }
  </div>

  <div class="form-group">
    <label>Password *</label>
    <input type="password" [(ngModel)]="data.password" placeholder="Password" />
    @if (submitted && !data.password) {
      <span class="error">Password is required</span>
    }
  </div>

  <button (click)="login()" class="btn-primary">Login</button>

  <p class="link-text">
    Don't have an account? <a routerLink="/register">Register here</a>
  </p>
</div>
